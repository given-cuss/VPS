name: Auto Run ISO Task
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Run ISO in VM
        run: |
          # Lancement de l'ISO avec QEMU en mode texte
          # -m 1024 : alloue 1 Go de RAM
          # -nographic : désactive l'affichage graphique requis par GitHub Actions
          qemu-system-x86_64 -m 1024 -cdrom custom-slowdns.iso -nographic
